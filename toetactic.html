

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe - Three Men's Morris</title>
    <link rel="stylesheet" href="toetactic.css">
</head>
<body>

<h1>Tic Tac Toe AI</h1>

<!-- CONTROL PANEL -->
<div class="controls">
    <label for="difficulty">Difficulty:</label>
    <select id="difficulty">
        <option value="1">Easy</option>
        <option value="3">Medium</option>
        <option value="5" selected>Hard</option>
        <option value="7">Expert</option>
    </select>

    <button onclick="resetGame()">🔄 Reset</button>
</div>

<!-- INFO ROLE -->
<div id="info"></div>

<!-- BOARD -->
<div id="board"></div>

<!-- STATUS -->
<p id="status">Loading...</p>

<script src="toetactic.js"></script>

</body>
</html>
